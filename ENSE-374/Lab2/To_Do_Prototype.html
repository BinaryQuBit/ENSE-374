<!DOCTYPE html>
<html lang="en"> <!-- Used English language for all the text on the page -->

    <head>
        <meta charset="UTF-8"> <!-- Using UTF - 8 as it vovers most of the characters in the world -->
        <title>To Do List</title>
        <link rel="stylesheet" type="text/css" href="Style.css" />
    </head>

    <body>
        <h1>To do</h1>
        <div>
            <h1>Log In</h1>
            <form action="">
                <label for="e_mail">Email</label><br>
                <input type="email" id="e_mail" name="e_mail" placeholder="Email address"><br>
                <label for="p_password">Password</label><br>
                <input type="password" id="p_password" name="p_password" placeholder="Password"><br>
                <input type="submit" value="Log In" class="button"> 
            </form>

        <br>
            
            <h1>Sign Up</h1>
            <form action="">
                <label for="e_mail">Email</label><br>
                <input type="email" id="e_mail" name="e_mail" placeholder="Email address"><br>
                <label for="p_password">Password</label><br>
                <input type="password" id="p_password" name="p_password" placeholder="Password"><br>
                <label for="authentication">Authentication</label><br>
                <input type="password" id="authentication" name="authentication" placeholder="Authentication"><br>
                <input type="submit" value="Sign Up" class="button">
                <br><br>
            </form>
        </div>
    </body>
</html>
